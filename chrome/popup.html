<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MyLogger 日志查看器</title>
    <style>
      body {
        width: 260px;
        margin: 0;
        padding: 14px;
        font: 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #17202a;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 16px;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 6px;
        padding: 9px 10px;
        background: #1f6feb;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }

      p {
        margin: 10px 0 0;
        color: #5b6573;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <h1>MyLogger 日志查看器</h1>
    <button id="openViewer" type="button">打开查看器</button>
    <p>打开本地日志，支持过滤、搜索、复制、保存结果和本地分析。</p>
    <script src="popup.js"></script>
  </body>
</html>
