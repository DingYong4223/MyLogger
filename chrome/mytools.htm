function IsArray(obj) {

  return obj &&

          typeof obj === 'object' &&

          typeof obj.length === 'number' &&

          !(obj.propertyIsEnumerable('length'));

}

String.prototype.replaceAll = function(s1,s2) { 
    return this.replace(new RegExp(s1,"gm"),s2); 
}

function Process(){
  
  var json = document.getElementById("RawJson").value;
  json=json.replaceAll("\n","");

  var html = "";

  try{

    if(json == "") json = "\"\"";

    var obj = JSON.parse(json);

    html = ProcessObject(obj, 0, false, false, false);

    document.getElementById("Canvas").innerHTML = "<PRE class='CodeContainer'>"+html+"</PRE>";

  }catch(e){

    alert("JSON语法错误,不能格式化,错误信息:\n"+e.message);

    document.getElementById("Canvas").innerHTML = "";

  }

}

function ProcessParams(obj){
	var html = "";
	var params= new Array();
	params = obj.split("&");
	if(params.length <= 1) params = obj.split(",");

	for (i=0;i<params.length ;i++ ) {
		html = html + params[i]+"<br/>";
	}
	return html;
}

function MD5Decode(){
	var input = document.getElementById("RawJson").value;
	try{
		if(input == ""){
			alert("请输入要解码的MD5哈希值");
			return;
		}
		// 清除空格和换行
		input = input.replace(/\s+/g, '');
		
		// 验证是否是有效的MD5格式（32位16进制）
		if(!/^[a-fA-F0-9]{32}$/.test(input)){
			alert("输入的不是有效的MD5哈希值（需要32位16进制字符）");
			return;
		}
		
		var resultHTML = "<div style='padding:10px;'>";
		resultHTML += "<p style='color:#CC0000; font-weight:bold;'>注意：MD5是单向哈希算法，无法直接解码。</p>";
		resultHTML += "<p>MD5哈希值: <span style='color:#007777; font-weight:bold;'>" + input + "</span></p>";
		resultHTML += "<p>您可以尝试：</p>";
		resultHTML += "<ul>";
		resultHTML += "<li>使用在线MD5彩虹表查询服务（如 cmd5.com、md5decrypt.net）</li>";
		resultHTML += "<li>如果是简单密码，可能在常见密码库中找到对应明文</li>";
		resultHTML += "<li>如果是复杂字符串或加盐哈希，几乎不可能还原</li>";
		resultHTML += "</ul>";
		resultHTML += "</div>";
		
		document.getElementById("Canvas").innerHTML = resultHTML;
	}catch(e){
		alert("MD5解码失败,错误信息:\n"+e.message);
		document.getElementById("Canvas").innerHTML = "";
	}
}

// ========== 时间戳转换 ==========
function TimestampToDate(){
	var input = document.getElementById("RawJson").value.trim();
	try{
		if(input == ""){
			alert("请输入Unix时间戳（秒或毫秒）");
			return;
		}
		var ts = parseFloat(input);
		if(isNaN(ts)){
			alert("请输入有效的数字时间戳");
			return;
		}
		// 自动判断秒级还是毫秒级（13位为毫秒，10位为秒）
		if(ts < 1e12) ts = ts * 1000;
		var d = new Date(ts);
		var pad = function(n){ return n < 10 ? '0'+n : n; };
		var result = d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())
			+' '+pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
		var html = "<div style='padding:10px;'>";
		html += "<p>时间戳: <b>"+input+"</b></p>";
		html += "<p>本地时间: <b style='color:#007777;'>"+result+"</b></p>";
		html += "<p>UTC时间: <b style='color:#AA00AA;'>"+d.toUTCString()+"</b></p>";
		html += "</div>";
		document.getElementById("Canvas").innerHTML = html;
	}catch(e){
		alert("时间戳转换失败,错误信息:\n"+e.message);
		document.getElementById("Canvas").innerHTML = "";
	}
}

function DateToTimestamp(){
	var input = document.getElementById("RawJson").value.trim();
	try{
		if(input == ""){
			// 输入为空则显示当前时间戳
			var now = new Date();
			var html = "<div style='padding:10px;'>";
			html += "<p>当前时间: <b>"+now.toLocaleString()+"</b></p>";
			html += "<p>秒级时间戳: <b style='color:#007777;'>"+Math.floor(now.getTime()/1000)+"</b></p>";
			html += "<p>毫秒级时间戳: <b style='color:#AA00AA;'>"+now.getTime()+"</b></p>";
			html += "</div>";
			document.getElementById("Canvas").innerHTML = html;
			return;
		}
		var d = new Date(input);
		if(isNaN(d.getTime())){
			alert("请输入有效的日期时间（如：2024-01-01 12:00:00），或留空查看当前时间戳");
			return;
		}
		var html = "<div style='padding:10px;'>";
		html += "<p>日期时间: <b>"+input+"</b></p>";
		html += "<p>秒级时间戳: <b style='color:#007777;'>"+Math.floor(d.getTime()/1000)+"</b></p>";
		html += "<p>毫秒级时间戳: <b style='color:#AA00AA;'>"+d.getTime()+"</b></p>";
		html += "</div>";
		document.getElementById("Canvas").innerHTML = html;
	}catch(e){
		alert("日期转时间戳失败,错误信息:\n"+e.message);
		document.getElementById("Canvas").innerHTML = "";
	}
}

// ========== HTML 编码/解码 ==========
function HtmlEncode(){
	var input = document.getElementById("RawJson").value;
	try{
		if(input == ""){
			alert("请输入要编码的内容");
			return;
		}
		var encoded = input
			.replace(/&/g, '&amp;')
			.replace(/</g, '&lt;')
			.replace(/>/g, '&gt;')
			.replace(/"/g, '&quot;')
			.replace(/'/g, '&#39;');
		document.getElementById("Canvas").innerHTML = "<PRE class='CodeContainer'>"+encoded+"</PRE>";
	}catch(e){
		alert("HTML编码失败,错误信息:\n"+e.message);
		document.getElementById("Canvas").innerHTML = "";
	}
}

function HtmlDecode(){
	var input = document.getElementById("RawJson").value;
	try{
		if(input == ""){
			alert("请输入要解码的HTML内容");

// ========== 字符统计 ==========
function CharCount(){
	var input = document.getElementById("RawJson").value;
	try{
		var charCount = input.length;
		var noSpaceCount = input.replace(/\s/g, '').length;
		var lineCount = input === '' ? 0 : input.split('\n').length;
		var wordCount = input.trim() === '' ? 0 : input.trim().split(/\s+/).length;
		// 计算字节数（UTF-8）
		var byteCount = 0;
		for(var i = 0; i < input.length; i++){
			var code = input.charCodeAt(i);
			if(code <= 0x007F) byteCount += 1;
			else if(code <= 0x07FF) byteCount += 2;
			else byteCount += 3;
		}
		// 中文字符数
		var cnCount = (input.match(/[\u4e00-\u9fa5]/g) || []).length;
		var html = "<div style='padding:10px;'>";
		html += "<table style='border-collapse:collapse;'>";
		html += "<tr><td style='padding:4px 16px 4px 0;color:#CC0000;font-weight:bold;'>总字符数</td><td style='padding:4px;'><b>"+charCount+"</b></td></tr>";
		html += "<tr><td style='padding:4px 16px 4px 0;color:#CC0000;font-weight:bold;'>非空白字符数</td><td style='padding:4px;'><b>"+noSpaceCount+"</b></td></tr>";
		html += "<tr><td style='padding:4px 16px 4px 0;color:#CC0000;font-weight:bold;'>字节数(UTF-8)</td><td style='padding:4px;'><b>"+byteCount+"</b></td></tr>";
		html += "<tr><td style='padding:4px 16px 4px 0;color:#CC0000;font-weight:bold;'>中文字符数</td><td style='padding:4px;'><b>"+cnCount+"</b></td></tr>";
		html += "<tr><td style='padding:4px 16px 4px 0;color:#CC0000;font-weight:bold;'>单词数</td><td style='padding:4px;'><b>"+wordCount+"</b></td></tr>";
		html += "<tr><td style='padding:4px 16px 4px 0;color:#CC0000;font-weight:bold;'>行数</td><td style='padding:4px;'><b>"+lineCount+"</b></td></tr>";
		html += "</table></div>";
		document.getElementById("Canvas").innerHTML = html;
	}catch(e){
		alert("字符统计失败,错误信息:\n"+e.message);
		document.getElementById("Canvas").innerHTML = "";
	}
}

	}
}

// ========== JSON 压缩 ==========
function JsonCompress(){
	var json = document.getElementById("RawJson").value;
	try{
		if(json.trim() == ""){
			alert("请输入要压缩的JSON内容");
			return;
		}
		var obj = JSON.parse(json);
		var compressed = JSON.stringify(obj);
		document.getElementById("Canvas").innerHTML = "<PRE class='CodeContainer'>"+compressed+"</PRE>";
	}catch(e){
		alert("JSON压缩失败,请检查JSON格式是否正确\n错误信息:\n"+e.message);
		document.getElementById("Canvas").innerHTML = "";
	}
}

// ========== Schema 格式化 ==========
function SchemaFormat(){
	var input = document.getElementById("RawJson").value.trim();
	try{
		if(input == ""){
			alert("请输入Schema URL");
			return;
		}
		// 提取 scheme（://前面的部分）
		var schemeEnd = input.indexOf("://");
		if(schemeEnd === -1){
			alert("无效的Schema URL，缺少://");
			return;
		}
		var scheme = input.substring(0, schemeEnd);
		var rest = input.substring(schemeEnd + 3);

		// 提取 host 和 path（?前面的部分）
		var queryStart = rest.indexOf("?");
		var hostPath = queryStart === -1 ? rest : rest.substring(0, queryStart);
		var queryString = queryStart === -1 ? "" : rest.substring(queryStart + 1);

		var slashIdx = hostPath.indexOf("/");
		var host = slashIdx === -1 ? hostPath : hostPath.substring(0, slashIdx);
		var path = slashIdx === -1 ? "" : hostPath.substring(slashIdx + 1);
		var uri = hostPath;

		// 解析参数
		var params = [];
		if(queryString !== ""){
			var pairs = queryString.split("&");
			for(var i = 0; i < pairs.length; i++){
				var eqIdx = pairs[i].indexOf("=");
				if(eqIdx === -1){
					params.push({ key: pairs[i], value: "" });
				} else {
					var k = pairs[i].substring(0, eqIdx);
					var v = pairs[i].substring(eqIdx + 1);
					try{ v = decodeURIComponent(v); }catch(e){}
					params.push({ key: k, value: v });
				}
			}
		}

		var html = "<div style='padding:10px; font-family:monospace;'>";
		html += "<p><span style='color:#CC0000;font-weight:bold;'>Schema:</span> <span style='color:#007777;'>" + scheme + "</span></p>";
		html += "<p><span style='color:#CC0000;font-weight:bold;'>Uri:</span> <span style='color:#007777;'>" + uri + "</span></p>";
		html += "<p><span style='color:#CC0000;font-weight:bold;'>Host:</span> <span style='color:#007777;'>" + host + "</span></p>";
		html += "<p><span style='color:#CC0000;font-weight:bold;'>Path:</span> <span style='color:#007777;'>" + path + "</span></p>";
		if(params.length > 0){
			html += "<p><span style='color:#CC0000;font-weight:bold;'>Params:</span></p>";
			html += "<table style='border-collapse:collapse; margin-left:16px;'>";
			for(var i = 0; i < params.length; i++){
				html += "<tr>";
				html += "<td style='padding:2px 8px 2px 0; color:#AA00AA; font-weight:bold;'>" + params[i].key + "</td>";
				html += "<td style='padding:2px 4px; color:#000;'>-&gt;</td>";
				html += "<td style='padding:2px 0 2px 8px; color:#007777;'>" + params[i].value + "</td>";
				html += "</tr>";
			}
			html += "</table>";
		} else {
			html += "<p><span style='color:#CC0000;font-weight:bold;'>Params:</span> <span style='color:#999;'>(无)</span></p>";
		}
		html += "</div>";
		document.getElementById("Canvas").innerHTML = html;
	}catch(e){
		alert("Schema格式化失败,错误信息:\n"+e.message);
		document.getElementById("Canvas").innerHTML = "";
	}
}

// ========== 二维码生成 ==========
function GenerateQRCode(){
	var input = document.getElementById("RawJson").value.trim();
	try{
		if(input == ""){
			alert("请输入要生成二维码的内容");
			return;
		}
		var canvas = document.getElementById("Canvas");
		canvas.innerHTML = "";

		var wrapper = document.createElement("div");
		wrapper.style.padding = "10px";

		var qrDiv = document.createElement("div");
		qrDiv.id = "qrcode-output";
		wrapper.appendChild(qrDiv);

		var hint = document.createElement("p");
		hint.style.color = "#666";
		hint.style.fontSize = "12px";
		hint.style.marginTop = "8px";
		hint.textContent = "内容：" + (input.length > 60 ? input.substring(0, 60) + "…" : input);
		wrapper.appendChild(hint);

		canvas.appendChild(wrapper);

		new QRCode(qrDiv, {
			text: input,
			width: 200,
			height: 200,
			colorDark: "#000000",
			colorLight: "#ffffff",
			correctLevel: QRCode.CorrectLevel.M
		});
	}catch(e){
		alert("二维码生成失败,错误信息:\n"+e.message);
		document.getElementById("Canvas").innerHTML = "";
	}
}

// ========== 复制到剪贴板 ==========
function CopyToClipboard(){
	var canvas = document.getElementById("Canvas");
	try{
		if(!canvas || canvas.innerHTML.trim() == ""){
			alert("内容区为空，无法复制");
			return;
		}
		// 获取纯文本内容
		var text = canvas.innerText || canvas.textContent;
		
		// 使用现代 Clipboard API
		if(navigator.clipboard && window.isSecureContext){
			navigator.clipboard.writeText(text).then(function(){
				alert("复制成功！");
			}, function(err){
				alert("复制失败：" + err);
			});
		}else{
			// 降级方案：使用 textarea
			var textarea = document.createElement('textarea');
			textarea.value = text;
			textarea.style.position = 'fixed';
			textarea.style.opacity = '0';
			document.body.appendChild(textarea);
			textarea.select();
			try{
				var successful = document.execCommand('copy');
				if(successful){
					alert("复制成功！");
				}else{
					alert("复制失败，请手动复制");
				}
			}catch(err){
				alert("复制失败：" + err);
			}
			document.body.removeChild(textarea);
		}
	}catch(e){
		alert("复制失败,错误信息:\n"+e.message);
	}
}

function ProcessObject(obj, indent, addComma, isArray, isPropertyContent){

  var html = "";

  var comma = (addComma) ? "<span class='Comma'>,</span> " : "";

  var type = typeof obj;

 

  if(IsArray(obj)){

    if(obj.length == 0){

      html += GetRow(indent, "<span class='ArrayBrace'>[ ]</span>"+comma, isPropertyContent);

    }else{

      html += GetRow(indent, "<span class='ArrayBrace'>[</span>", isPropertyContent);

      for(var i = 0; i < obj.length; i++){

        html += ProcessObject(obj[i], indent + 1, i < (obj.length - 1), true, false);

      }

      html += GetRow(indent, "<span class='ArrayBrace'>]</span>"+comma);

    }

  }else if(type == 'object' && obj == null){

    html += FormatLiteral("null", "", comma, indent, isArray, "Null");

  }else if(type == 'object'){

    var numProps = 0;

    for(var prop in obj) numProps++;

    if(numProps == 0){

      html += GetRow(indent, "<span class='ObjectBrace'>{ }</span>"+comma, isPropertyContent);

    }else{

      html += GetRow(indent, "<span class='ObjectBrace'>{</span>", isPropertyContent);

      var j = 0;

      for(var prop in obj){

        html += GetRow(indent + 1, '<span class="PropertyName">"'+prop+'"</span>: '+ProcessObject(obj[prop], indent + 1, ++j < numProps, false, true));

      }

      html += GetRow(indent, "<span class='ObjectBrace'>}</span>"+comma);

    }

  }else if(type == 'number'){

    html += FormatLiteral(obj, "", comma, indent, isArray, "Number");

  }else if(type == 'boolean'){

    html += FormatLiteral(obj, "", comma, indent, isArray, "Boolean");

  }else if(type == 'function'){

    obj = FormatFunction(indent, obj);

    html += FormatLiteral(obj, "", comma, indent, isArray, "Function");

  }else if(type == 'undefined'){

    html += FormatLiteral("undefined", "", comma, indent, isArray, "Null");

  }else{

    html += FormatLiteral(obj, "\"", comma, indent, isArray, "String");

  }

  return html;

}

function FormatLiteral(literal, quote, comma, indent, isArray, style){

  if(typeof literal == 'string')

    literal = literal.split("<").join("&lt;").split(">").join("&gt;");

  var str = "<span class='"+style+"'>"+quote+literal+quote+comma+"</span>";

  if(isArray) str = GetRow(indent, str);

  return str;

}

function FormatFunction(indent, obj){

  var tabs = "";

  for(var i = 0; i < indent; i++) tabs += window.TAB;

  var funcStrArray = obj.toString().split("\n");

  var str = "";

  for(var i = 0; i < funcStrArray.length; i++){

    str += ((i==0)?"":tabs) + funcStrArray[i] + "\n";

  }

  return str;

}

function GetRow(indent, data, isPropertyContent){

  var tabs = "";

  for(var i = 0; i < indent && !isPropertyContent; i++) tabs += window.TAB;

  if(data != null && data.length > 0 && data.charAt(data.length-1) != "\n")

    data = data+"\n";

  return tabs+data;                      

}
